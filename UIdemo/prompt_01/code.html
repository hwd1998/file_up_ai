<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "unit": "4px"

                    "fontFamily": {

                        "caption": ["Inter"],
                        "body-base": ["Inter"],
                        "body-large": ["Inter"],
                        "headline-section": ["Inter"],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .mesh-gradient {
            background: linear-gradient(135deg, #1d4ed8 0%, #312e81 100%);
            position: relative;
            overflow: hidden;
        }
        .mesh-blob {
            position: absolute;
            filter: blur(80px);
            border-radius: 9999px;
            opacity: 0.4;
        }
    </style>
</head>
<body class="bg-surface font-body-base antialiased">
<!-- Main Container -->
<main class="flex min-h-screen w-full">
<!-- Left Panel: Decorative Branding -->
<section class="hidden lg:flex lg:w-[60%] mesh-gradient flex-col items-center justify-center relative px-container-padding overflow-hidden">
<!-- Decorative Elements -->
<div class="mesh-blob bg-blue-400 w-[500px] h-[500px] -top-24 -left-24"></div>
<div class="mesh-blob bg-indigo-500 w-[400px] h-[400px] bottom-0 right-0"></div>
<div class="mesh-blob bg-primary-container w-[300px] h-[300px] top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></div>
<!-- Abstract Grid Pattern Overlay -->
<div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(circle, white 1px, transparent 1px); background-size: 40px 40px;"></div>
<div class="relative z-10 text-center space-y-stack-md max-w-2xl">
<h1 class="text-white font-display-xl text-display-xl tracking-tight">企业数据上报平台</h1>
<p class="text-on-tertiary-container font-body-large text-body-large opacity-90">
                    统一上传 · 规范校验 · 实时监控
                </p>
<div class="pt-stack-lg">
<div class="relative mx-auto w-full max-w-lg aspect-square rounded-2xl bg-white/5 backdrop-blur-sm border border-white/10 flex items-center justify-center">
<img alt="Data Management Interface" class="w-4/5 h-auto rounded-xl shadow-2xl" data-alt="A minimalist, technical wireframe illustration featuring clean, thin white lines on a deep blue background. The art represents an abstract data grid and network nodes, conveying a professional and high-tech corporate feel through simple geometric structures and digital connections." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB2eD6T6H6p6T6H6p6T6H6p6T6H6p6T6H6p6T6H6p6T6H6p6T6H6p6T6H6p6T6H6p6T6H6p6T6H6p6T6H6p6T6H6p6T6H6p"/>
</div>
</div>
</div>
</section>
<!-- Right Panel: Login Interaction -->
<section class="w-full lg:w-[40%] bg-white flex flex-col justify-between px-12 py-10 relative">
<!-- Top Branding -->
<div class="flex flex-col items-center">
<div class="flex items-center gap-2 mb-stack-lg">
<div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white" data-icon="cloud_upload">cloud_upload</span>
</div>
<span class="font-headline-section text-headline-section text-on-surface">文件上传管理系统</span>
</div>
</div>
<!-- Login Center Block -->
<div class="w-full max-w-sm mx-auto">
<div class="text-center mb-10">
<h2 class="font-headline-dashboard text-headline-dashboard text-on-surface mb-2">欢迎回来</h2>
<p class="font-body-base text-outline">请使用企业飞书账号登录</p>
</div>
<div class="space-y-stack-md">
<!-- Feishu Login Button -->
<button class="w-full h-12 bg-[#007AFF] hover:bg-[#0062CC] text-white font-label-bold text-body-large flex items-center justify-center gap-3 rounded-lg transition-all active:scale-[0.98] shadow-md shadow-blue-200">
<svg class="w-6 h-6 fill-current" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 2C6.477 2 2 6.477 2 12c0 5.523 4.477 10 10 10s10-4.477 10-10c0-5.523-4.477-10-10-10zm4.5 13.5l-1.5 1.5-3-3-3 3-1.5-1.5 4.5-4.5-4.5-4.5 1.5-1.5 3 3 3-3 1.5 1.5-4.5 4.5 4.5 4.5z" fill="none"></path>
<path d="M16.5 15.5L15 17l-3-3-3 3-1.5-1.5L12 11l-4.5-4.5L9 5l3 3 3-3 1.5 1.5L12 11l4.5 4.5z"></path>
</svg>
<span>使用飞书账号登录</span>
</button>
<p class="text-caption font-caption text-outline text-center">
                        点击后将跳转至飞书授权页面
                    </p>
</div>
<!-- Alternative Methods (Subtle) -->
<div class="mt-12 flex items-center gap-4">
<div class="flex-grow border-t border-surface-container-high"></div>
<span class="text-caption font-caption text-outline-variant uppercase tracking-wider">其他方式</span>
<div class="flex-grow border-t border-surface-container-high"></div>
</div>
<div class="mt-8 grid grid-cols-2 gap-gutter">
<button class="flex items-center justify-center gap-2 py-2 border border-outline-variant rounded-lg hover:bg-surface-container-low transition-colors text-on-surface-variant font-label-bold text-caption">
<span class="material-symbols-outlined text-[18px]" data-icon="badge">badge</span>
                        员工工号
                    </button>
<button class="flex items-center justify-center gap-2 py-2 border border-outline-variant rounded-lg hover:bg-surface-container-low transition-colors text-on-surface-variant font-label-bold text-caption">
<span class="material-symbols-outlined text-[18px]" data-icon="mail">mail</span>
                        邮箱登录
                    </button>
</div>
</div>
<!-- Footer -->
<footer class="flex flex-col items-center gap-2">
<div class="flex gap-4 text-caption font-caption text-outline">
<a class="hover:text-primary transition-colors" href="#">隐私政策</a>
<span class="w-1 h-1 bg-outline-variant rounded-full my-auto"></span>
<a class="hover:text-primary transition-colors" href="#">服务条款</a>
</div>
<p class="text-caption font-caption text-outline-variant">
                    © 2026 企业数据中台 · 版权所有
                </p>
</footer>
</section>
