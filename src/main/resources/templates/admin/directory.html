<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>目录管理 - 数据上报平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>[x-cloak]{display:none!important}</style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Top Nav -->
<nav class="bg-white border-b border-gray-200 px-6 flex items-center justify-between fixed top-0 left-0 right-0 z-30 h-14">
    <div class="flex items-center gap-3">
        <a href="/home" class="flex items-center gap-3 hover:opacity-80">
            <div class="w-7 h-7 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-md flex items-center justify-center">
                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                </svg>
            </div>
            <span class="font-semibold text-gray-800 text-sm">数据上报平台</span>
        </a>
        <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
        </svg>
        <span class="text-sm text-gray-900 font-medium">目录管理</span>
    </div>
    <div class="flex items-center gap-3">
        <span class="text-sm text-gray-600" th:text="${loginUser?.userName}"></span>
        <span class="text-xs bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full">管理员</span>
        <a href="/home" class="text-xs text-gray-400 hover:text-gray-600 ml-2">返回首页</a>
    </div>
</nav>

<div class="pt-14 flex min-h-screen">
    <!-- Admin Sidebar -->
    <aside class="w-48 bg-white border-r border-gray-200 fixed top-14 left-0 bottom-0 z-20">
        <nav class="p-3 space-y-1">
            <a href="/admin/template"
               class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
                </svg>
                数据模板
            </a>
            <a href="/admin/directory"
               class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium bg-blue-50 text-blue-600 border-r-2 border-blue-500">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
                </svg>
                目录管理
            </a>
        </nav>
    </aside>

    <!-- Main -->
    <main class="ml-48 flex-1 p-6" x-data="directoryAdmin()" x-init="loadTree()">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-xl font-bold text-gray-900">目录管理</h1>
                <p class="text-sm text-gray-500 mt-0.5">管理数据上报的目录结构</p>
            </div>
            <button @click="openCreate(null)"
                    class="flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                新建根目录
            </button>
        </div>

        <!-- Alert -->
        <div x-show="alert.show" x-cloak
             :class="alert.type === 'success' ? 'bg-green-50 border-green-200 text-green-700' : 'bg-red-50 border-red-200 text-red-700'"
             class="border rounded-lg px-4 py-3 mb-4 text-sm flex items-center justify-between">
            <span x-text="alert.msg"></span>
            <button @click="alert.show=false" class="ml-4 opacity-60 hover:opacity-100">✕</button>
        </div>

        <!-- Directory Tree Table -->
        <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
            <template x-if="loading">
                <div class="p-12 text-center text-gray-400">
                    <svg class="w-5 h-5 animate-spin mx-auto mb-2 text-blue-500" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                    </svg>
                    加载中...
                </div>
            </template>

            <template x-if="!loading && flatList.length === 0">
                <div class="p-12 text-center text-gray-400">
                    <svg class="w-12 h-12 mx-auto mb-3 text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
                    </svg>
                    <p class="mb-3">暂无目录，点击「新建根目录」开始</p>
                </div>
            </template>

            <template x-if="!loading && flatList.length > 0">
                <table class="w-full">
                    <thead class="bg-gray-50 border-b border-gray-200">
                    <tr>
                        <th class="text-left text-xs font-medium text-gray-500 uppercase tracking-wider px-6 py-3">目录名称</th>
                        <th class="text-left text-xs font-medium text-gray-500 uppercase tracking-wider px-6 py-3">路径</th>
                        <th class="text-left text-xs font-medium text-gray-500 uppercase tracking-wider px-6 py-3">类型</th>
                        <th class="text-right text-xs font-medium text-gray-500 uppercase tracking-wider px-6 py-3">操作</th>
                    </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                    <template x-for="item in flatList" :key="item.id">
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="px-6 py-3">
                                <div class="flex items-center gap-2" :style="'padding-left:' + (item.depth * 20) + 'px'">
                                    <svg class="w-4 h-4 flex-shrink-0" :class="item.isLeaf ? 'text-blue-400' : 'text-yellow-500'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
                                    </svg>
                                    <span class="text-sm font-medium text-gray-800" x-text="item.name"></span>
                                </div>
                            </td>
                            <td class="px-6 py-3 text-sm text-gray-500" x-text="item.fullPath || '-'"></td>
                            <td class="px-6 py-3">
                                <span class="text-xs px-2 py-0.5 rounded-full font-medium"
                                      :class="item.isLeaf ? 'bg-blue-100 text-blue-700' : 'bg-yellow-100 text-yellow-700'"
                                      x-text="item.isLeaf ? '叶子节点' : '分组'"></span>
                            </td>
                            <td class="px-6 py-3 text-right">
                                <div class="flex items-center justify-end gap-2">
                                    <button x-show="!item.isLeaf"
                                            @click="openCreate(item)"
                                            class="text-xs text-blue-600 hover:text-blue-800 font-medium px-2 py-1 rounded hover:bg-blue-50">
                                        + 子目录
                                    </button>
                                    <button @click="openRename(item)"
                                            class="text-xs text-gray-600 hover:text-gray-800 font-medium px-2 py-1 rounded hover:bg-gray-100">
                                        重命名
                                    </button>
                                    <button @click="confirmDelete(item)"
                                            class="text-xs text-red-500 hover:text-red-700 font-medium px-2 py-1 rounded hover:bg-red-50">
                                        删除
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </template>
                    </tbody>
                </table>
            </template>
        </div>
    </main>
</div>

<!-- Create/Rename Modal -->
<div x-data x-show="$store.modal.show" x-cloak
     class="fixed inset-0 bg-black/40 z-50 flex items-center justify-center"
     @click.self="$store.modal.show = false">
    <div class="bg-white rounded-xl shadow-xl w-96 p-6">
        <h3 class="text-base font-semibold text-gray-900 mb-1" x-text="$store.modal.title"></h3>
        <p class="text-sm text-gray-500 mb-4" x-text="$store.modal.subtitle"></p>
        <input type="text"
               x-model="$store.modal.value"
               @keydown.enter="$store.modal.confirm()"
               placeholder="请输入目录名称"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-blue-400 mb-4"/>
        <div class="flex justify-end gap-2">
            <button @click="$store.modal.show = false"
                    class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800 border border-gray-200 rounded-lg hover:bg-gray-50">
                取消
            </button>
            <button @click="$store.modal.confirm()"
                    class="px-4 py-2 text-sm text-white bg-blue-600 hover:bg-blue-700 rounded-lg font-medium">
                确定
            </button>
        </div>
    </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
    Alpine.store('modal', {
        show: false,
        title: '',
        subtitle: '',
        value: '',
        confirm: () => {}
    });
});

function directoryAdmin() {
    return {
        tree: [],
        flatList: [],
        loading: true,
        alert: { show: false, type: 'success', msg: '' },

        async loadTree() {
            this.loading = true;
            try {
                const res = await fetch('/harness/api/v1/directories/tree');
                const json = await res.json();
                if (json.code === 200) {
                    this.tree = json.data || [];
                    this.flatList = this.flatten(this.tree, 0);
                }
            } catch (e) {
                this.showAlert('error', '加载失败：' + e.message);
            } finally {
                this.loading = false;
            }
        },

        flatten(nodes, depth) {
            const result = [];
            for (const n of nodes) {
                result.push({ ...n, depth });
                if (n.children && n.children.length > 0) {
                    result.push(...this.flatten(n.children, depth + 1));
                }
            }
            return result;
        },

        openCreate(parent) {
            const store = Alpine.store('modal');
            store.title = parent ? `在「${parent.name}」下新建子目录` : '新建根目录';
            store.subtitle = parent ? '将作为叶子节点（可上传文件）' : '将作为顶级分组目录';
            store.value = '';
            store.show = true;
            store.confirm = async () => {
                const name = store.value.trim();
                if (!name) return;
                try {
                    const res = await fetch('/harness/api/v1/directories', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ parentId: parent ? parent.id : null, name })
                    });
                    const json = await res.json();
                    if (json.code === 200) {
                        store.show = false;
                        this.showAlert('success', '目录创建成功');
                        await this.loadTree();
                    } else {
                        this.showAlert('error', json.message || '创建失败');
                    }
                } catch (e) {
                    this.showAlert('error', '网络错误：' + e.message);
                }
            };
        },

        openRename(item) {
            const store = Alpine.store('modal');
            store.title = '重命名目录';
            store.subtitle = `当前名称：${item.name}`;
            store.value = item.name;
            store.show = true;
            store.confirm = async () => {
                const name = store.value.trim();
                if (!name || name === item.name) { store.show = false; return; }
                try {
                    const res = await fetch(`/harness/api/v1/directories/${item.id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name })
                    });
                    const json = await res.json();
                    if (json.code === 200) {
                        store.show = false;
                        this.showAlert('success', '重命名成功');
                        await this.loadTree();
                    } else {
                        this.showAlert('error', json.message || '重命名失败');
                    }
                } catch (e) {
                    this.showAlert('error', '网络错误：' + e.message);
                }
            };
        },

        async confirmDelete(item) {
            if (!confirm(`确定删除目录「${item.name}」？若有子目录将一并删除。`)) return;
            try {
                const res = await fetch(`/harness/api/v1/directories/${item.id}`, { method: 'DELETE' });
                const json = await res.json();
                if (json.code === 200) {
                    this.showAlert('success', '删除成功');
                    await this.loadTree();
                } else {
                    this.showAlert('error', json.message || '删除失败');
                }
            } catch (e) {
                this.showAlert('error', '网络错误：' + e.message);
            }
        },

        showAlert(type, msg) {
            this.alert = { show: true, type, msg };
            setTimeout(() => { this.alert.show = false; }, 4000);
        }
    };
}
</script>
</body>
</html>
