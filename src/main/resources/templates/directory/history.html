<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>上传历史 - 数据上报平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>[x-cloak]{display:none!important}</style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Top Nav -->
<nav class="bg-white border-b border-gray-200 px-6 flex items-center justify-between fixed top-0 left-0 right-0 z-30 h-14">
    <div class="flex items-center gap-3">
        <a href="/home" class="flex items-center gap-3 hover:opacity-80">
            <div class="w-7 h-7 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-md flex items-center justify-center">
                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                </svg>
            </div>
            <span class="font-semibold text-gray-800 text-sm">数据上报平台</span>
        </a>
        <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
        </svg>
        <span class="text-sm text-gray-500">上传历史</span>
    </div>
    <div class="flex items-center gap-3">
        <span class="text-sm text-gray-600" th:text="${loginUser?.userName}"></span>
        <span th:if="${loginUser?.admin}" class="text-xs bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full">管理员</span>
    </div>
</nav>

<div class="pt-14 px-6 py-6 max-w-7xl mx-auto"
     th:attr="x-data='historyApp(' + ${directoryId} + ')'"
     x-init="loadData()">

    <!-- Breadcrumb + Actions -->
    <div class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-2 text-sm text-gray-500">
            <a href="/home" class="hover:text-blue-600">首页</a>
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            <span class="text-gray-900 font-medium" x-text="directoryName"></span>
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            <span class="text-gray-900">上传历史</span>
        </div>
        <a :href="'/directory/' + directoryId + '/upload'"
           class="flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            上传文件
        </a>
    </div>

    <!-- Filters -->
    <div class="bg-white rounded-xl border border-gray-200 p-4 mb-4 flex flex-wrap gap-3">
        <input type="text" x-model="filters.fileName" placeholder="搜索文件名..."
               class="px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:border-blue-400 w-44"/>
        <select x-model="filters.status" class="px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:border-blue-400">
            <option value="">全部状态</option>
            <option value="PENDING">待处理</option>
            <option value="VALIDATING">校验中</option>
            <option value="PROCESSING">处理中</option>
            <option value="SUCCESS">成功</option>
            <option value="FAILED">失败</option>
            <option value="PARTIAL_FAILED">部分失败</option>
        </select>
        <input type="date" x-model="filters.startTime" class="px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:border-blue-400"/>
        <input type="date" x-model="filters.endTime" class="px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:border-blue-400"/>
        <button @click="loadData()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors">查询</button>
        <button @click="resetFilters()" class="px-4 py-2 border border-gray-200 text-gray-600 text-sm font-medium rounded-lg hover:bg-gray-50 transition-colors">重置</button>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead>
                    <tr class="bg-gray-50 border-b border-gray-200">
                        <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">文件名</th>
                        <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">状态</th>
                        <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">行数</th>
                        <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">错误数</th>
                        <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">上传人</th>
                        <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">上传时间</th>
                        <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">操作</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-if="loading">
                        <tr>
                            <td colspan="7" class="text-center py-12 text-gray-400">
                                <svg class="w-5 h-5 animate-spin mx-auto mb-2 text-blue-500" fill="none" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                                </svg>
                                加载中...
                            </td>
                        </tr>
                    </template>
                    <template x-if="!loading && tasks.length === 0">
                        <tr>
                            <td colspan="7" class="text-center py-12 text-gray-400">暂无上传记录</td>
                        </tr>
                    </template>
                    <template x-for="task in tasks" :key="task.id">
                        <tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors">
                            <td class="px-4 py-3">
                                <div class="flex items-center gap-2">
                                    <svg class="w-4 h-4 text-blue-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                    </svg>
                                    <div>
                                        <p class="font-medium text-gray-800 max-w-xs truncate" x-text="task.fileName"></p>
                                        <p x-show="task.isNoData" class="text-xs text-orange-500">无数据申报</p>
                                    </div>
                                </div>
                            </td>
                            <td class="px-4 py-3">
                                <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium"
                                      :class="statusClass(task.status)"
                                      x-text="task.statusDesc"></span>
                            </td>
                            <td class="px-4 py-3 text-gray-600" x-text="task.rowCount != null ? task.rowCount.toLocaleString() : '-'"></td>
                            <td class="px-4 py-3">
                                <span x-show="task.errorCount > 0"
                                      class="text-red-600 font-medium cursor-pointer hover:underline"
                                      x-text="task.errorCount"
                                      @click="showErrors(task)"></span>
                                <span x-show="!task.errorCount || task.errorCount === 0" class="text-gray-400">-</span>
                            </td>
                            <td class="px-4 py-3 text-gray-600" x-text="task.uploaderName || '-'"></td>
                            <td class="px-4 py-3 text-gray-500 text-xs" x-text="formatDate(task.createTime)"></td>
                            <td class="px-4 py-3">
                                <div class="flex items-center gap-2">
                                    <button @click="showDetail(task)" class="text-blue-600 hover:text-blue-800 text-xs font-medium">详情</button>
                                    <a x-show="task.downloadable" :href="'/harness/api/v1/tasks/' + task.id + '/download'"
                                       class="text-gray-500 hover:text-gray-700 text-xs font-medium">下载</a>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="px-4 py-3 border-t border-gray-100 flex items-center justify-between text-sm text-gray-500">
            <span x-text="'共 ' + total + ' 条记录'"></span>
            <div class="flex items-center gap-1">
                <button @click="changePage(currentPage - 1)" :disabled="currentPage <= 1"
                        class="px-2 py-1 rounded hover:bg-gray-100 disabled:opacity-40 disabled:cursor-not-allowed">上一页</button>
                <span class="px-3" x-text="currentPage + ' / ' + totalPages"></span>
                <button @click="changePage(currentPage + 1)" :disabled="currentPage >= totalPages"
                        class="px-2 py-1 rounded hover:bg-gray-100 disabled:opacity-40 disabled:cursor-not-allowed">下一页</button>
            </div>
        </div>
    </div>

    <!-- Detail Slide Panel -->
    <div x-show="panelOpen" x-cloak
         class="fixed inset-0 z-40 flex justify-end"
         @keydown.escape.window="panelOpen = false">
        <div class="absolute inset-0 bg-black/30" @click="panelOpen = false"></div>
        <div class="relative bg-white w-full max-w-lg h-full overflow-y-auto shadow-xl z-50 flex flex-col">
            <!-- Panel Header -->
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200 flex-shrink-0">
                <h3 class="font-semibold text-gray-900">任务详情</h3>
                <button @click="panelOpen = false" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <!-- Panel Body -->
            <div class="flex-1 px-6 py-4 space-y-4" x-show="activeTask">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <p class="text-xs text-gray-400 mb-1">文件名</p>
                        <p class="text-sm font-medium text-gray-800 break-all" x-text="activeTask?.fileName"></p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-400 mb-1">状态</p>
                        <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium"
                              :class="statusClass(activeTask?.status)"
                              x-text="activeTask?.statusDesc"></span>
                    </div>
                    <div>
                        <p class="text-xs text-gray-400 mb-1">文件大小</p>
                        <p class="text-sm text-gray-700" x-text="formatSize(activeTask?.fileSize)"></p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-400 mb-1">上传人</p>
                        <p class="text-sm text-gray-700" x-text="activeTask?.uploaderName || '-'"></p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-400 mb-1">数据行数</p>
                        <p class="text-sm text-gray-700" x-text="activeTask?.rowCount != null ? activeTask.rowCount.toLocaleString() : '-'"></p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-400 mb-1">错误行数</p>
                        <p class="text-sm" :class="(activeTask?.errorCount > 0) ? 'text-red-600 font-medium' : 'text-gray-700'"
                           x-text="activeTask?.errorCount || 0"></p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-400 mb-1">上传时间</p>
                        <p class="text-sm text-gray-700" x-text="formatDate(activeTask?.createTime)"></p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-400 mb-1">过期时间</p>
                        <p class="text-sm text-gray-700" x-text="formatDate(activeTask?.expireAt) || '永不过期'"></p>
                    </div>
                </div>

                <!-- Errors Table -->
                <div x-show="errors.length > 0">
                    <h4 class="text-sm font-semibold text-gray-700 mb-2">校验错误明细</h4>
                    <div class="border border-red-100 rounded-lg overflow-hidden">
                        <table class="w-full text-xs">
                            <thead class="bg-red-50">
                                <tr>
                                    <th class="text-left px-3 py-2 text-red-600 font-medium">行号</th>
                                    <th class="text-left px-3 py-2 text-red-600 font-medium">列名</th>
                                    <th class="text-left px-3 py-2 text-red-600 font-medium">错误信息</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="err in errors" :key="err.id">
                                    <tr class="border-t border-red-50">
                                        <td class="px-3 py-2 text-gray-600" x-text="err.rowNumber"></td>
                                        <td class="px-3 py-2 text-gray-600" x-text="err.columnName || '-'"></td>
                                        <td class="px-3 py-2 text-gray-700" x-text="err.errorMessage"></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Panel Footer -->
            <div class="px-6 py-4 border-t border-gray-200 flex gap-2 flex-shrink-0">
                <a x-show="activeTask?.downloadable"
                   :href="'/harness/api/v1/tasks/' + activeTask?.id + '/download'"
                   class="flex-1 flex items-center justify-center gap-2 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                    </svg>
                    下载原文件
                </a>
            </div>
        </div>
    </div>
</div>

<script>
function historyApp(directoryId) {
    return {
        directoryId,
        directoryName: '加载中...',
        tasks: [],
        total: 0,
        currentPage: 1,
        totalPages: 1,
        loading: true,
        filters: {
            fileName: '',
            status: '',
            startTime: '',
            endTime: ''
        },
        panelOpen: false,
        activeTask: null,
        errors: [],

        async loadData() {
            this.loading = true;
            try {
                const params = new URLSearchParams({
                    directoryId: this.directoryId,
                    page: this.currentPage,
                    size: 20
                });
                if (this.filters.fileName) params.append('fileName', this.filters.fileName);
                if (this.filters.status) params.append('status', this.filters.status);
                if (this.filters.startTime) params.append('startTime', this.filters.startTime + 'T00:00:00');
                if (this.filters.endTime) params.append('endTime', this.filters.endTime + 'T23:59:59');

                const res = await fetch('/harness/api/v1/tasks?' + params);
                const json = await res.json();
                if (json.code === 200) {
                    this.tasks = json.data.records || [];
                    this.total = json.data.total || 0;
                    this.totalPages = Math.max(1, Math.ceil(this.total / 20));
                }

                // Load directory name
                if (this.directoryName === '加载中...') {
                    const treeRes = await fetch('/harness/api/v1/directories/tree');
                    const treeJson = await treeRes.json();
                    if (treeJson.code === 200) {
                        const all = flattenTree(treeJson.data);
                        const dir = all.find(d => d.id == this.directoryId);
                        if (dir) this.directoryName = dir.name;
                    }
                }
            } catch (e) {
                console.error(e);
            } finally {
                this.loading = false;
            }
        },

        async showDetail(task) {
            this.activeTask = task;
            this.errors = [];
            this.panelOpen = true;
            if (task.errorCount > 0) {
                try {
                    const res = await fetch('/harness/api/v1/tasks/' + task.id + '/errors');
                    const json = await res.json();
                    if (json.code === 200) this.errors = json.data || [];
                } catch (e) {}
            }
        },

        showErrors(task) {
            this.showDetail(task);
        },

        changePage(p) {
            if (p < 1 || p > this.totalPages) return;
            this.currentPage = p;
            this.loadData();
        },

        resetFilters() {
            this.filters = { fileName: '', status: '', startTime: '', endTime: '' };
            this.currentPage = 1;
            this.loadData();
        },

        statusClass(status) {
            const map = {
                'PENDING': 'bg-gray-100 text-gray-600',
                'VALIDATING': 'bg-yellow-100 text-yellow-700',
                'PROCESSING': 'bg-blue-100 text-blue-700',
                'SUCCESS': 'bg-green-100 text-green-700',
                'FAILED': 'bg-red-100 text-red-700',
                'PARTIAL_FAILED': 'bg-orange-100 text-orange-700',
            };
            return map[status] || 'bg-gray-100 text-gray-600';
        },

        formatDate(val) {
            if (!val) return '';
            return new Date(val).toLocaleString('zh-CN', { hour12: false });
        },

        formatSize(bytes) {
            if (!bytes) return '-';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
            return (bytes / 1024 / 1024 / 1024).toFixed(2) + ' GB';
        }
    };
}

function flattenTree(nodes) {
    const result = [];
    function walk(arr) {
        for (const n of arr) {
            result.push(n);
            if (n.children) walk(n.children);
        }
    }
    walk(nodes || []);
    return result;
}
</script>
</body>
</html>
