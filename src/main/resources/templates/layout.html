<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle != null ? pageTitle + ' - 数据上报平台' : '数据上报平台'}">数据上报平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .sidebar-item.active { @apply bg-blue-50 text-blue-600 border-r-2 border-blue-500; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Top Nav -->
<nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between fixed top-0 left-0 right-0 z-30 h-14">
    <div class="flex items-center gap-3">
        <div class="w-7 h-7 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-md flex items-center justify-center">
            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
            </svg>
        </div>
        <span class="font-semibold text-gray-800 text-sm">数据上报平台</span>
    </div>
    <div class="flex items-center gap-3">
        <span class="text-sm text-gray-500" th:text="${loginUser?.userName}"></span>
        <span th:if="${loginUser?.admin}" class="text-xs bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full">管理员</span>
        <a href="/auth/feishu/login" class="text-sm text-gray-400 hover:text-gray-600">切换账号</a>
    </div>
</nav>

<!-- Layout Container -->
<div class="flex pt-14 min-h-screen">
    <!-- Sidebar -->
    <aside class="w-56 bg-white border-r border-gray-200 fixed top-14 left-0 bottom-0 overflow-y-auto z-20" th:fragment="sidebar">
        <div th:replace="~{:: #sidebar-content}"></div>
    </aside>

    <!-- Main Content -->
    <main class="ml-56 flex-1 p-6">
        <div th:replace="~{:: #page-content}"></div>
    </main>
</div>

</body>
</html>
