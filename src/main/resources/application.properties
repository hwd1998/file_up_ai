## 服务配置
server.port=8080
server.servlet.context-path=/
server.servlet.session.timeout=8h

## 数据库
spring.datasource.url=jdbc:mysql://localhost:3306/file_upload?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:hwd19981214}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

## MyBatis-Plus
mybatis-plus.global-config.db-config.logic-delete-field=isDeleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.slf4j.Slf4jImpl
mybatis-plus.mapper-locations=classpath*:mapper/**/*.xml

## Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

## 文件上传
spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB

## 飞书 OAuth2.0
feishu.app-id=${FEISHU_APP_ID:cli_a9799ec03238dbcd}
feishu.app-secret=${FEISHU_APP_SECRET:H8QIh6BbVX11VzVGzLpAIcXr5vFgoSvV}
feishu.redirect-uri=${FEISHU_REDIRECT_URI:http://localhost:8080/auth/feishu/callback}
feishu.webhook-url=${FEISHU_WEBHOOK_URL:}

## 上传配置
upload.tmp-dir=${UPLOAD_TMP_DIR:./upload-tmp}
upload.chunk-size=5242880
upload.max-file-size=2147483648
upload.max-files-per-request=40
upload.file-expire-days=90

## SpringDoc
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

## Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

## 日志
logging.level.com.example.upload=DEBUG
logging.level.org.springframework.security=INFO

## 异步校验线程池
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=50

logging.file.name=D:/A_code/file_up_ai/logs/app.log
